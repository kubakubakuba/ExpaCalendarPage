name: Generate and Deploy Calendars

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Inject Google Credentials
        run: |
          echo "${{ secrets.CREDENTIALS_JSON }}" > credentials.json
          echo "${{ secrets.TOKEN_PICKLE_B64 }}" | base64 --decode > token.pickle

      - name: Run PDF Generator
        run: python generate.py

      - name: Generate index.html
        run: |
          cd programy2026
          
          echo "<!DOCTYPE html><html><head><title>Astronomická expedice - Programy</title></head><body>" > index.html
          echo "<h1>Dostupné programy</h1><ul>" >> index.html
          
          echo "<li><strong><a href=\"latest/\">Dnešní program (/latest)</a></strong></li><br>" >> index.html
          
          for f in *.pdf; do
            echo "<li><a href=\"$f\">$f</a></li>" >> index.html
          done
          echo "</ul>" >> index.html
          
          cat << 'EOF' >> index.html
          <div style="margin-top: 40px; border-top: 1px solid #ccc; padding-top: 10px;">
              Počet dní od posledního pochcaného expedičníka vedoucím: <strong><span id="daysCounter"></span></strong>
          </div>
          <script>
              const pastDate = new Date('2026-07-06T00:00:00+02:00');
              const now = new Date();
              const diff = Math.floor((now - pastDate) / (1000 * 60 * 60 * 24));
              document.getElementById('daysCounter').innerText = diff > 0 ? diff : 0;
          </script>
          </body></html>
          EOF
          
          mkdir latest
          cat << 'EOF' > latest/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>Redirecting...</title>
              <script>
                  let d = new Date().toLocaleString("en-US", {timeZone: "Europe/Prague"});
                  let pragueDate = new Date(d);
                  let year = pragueDate.getFullYear();
                  let month = String(pragueDate.getMonth() + 1).padStart(2, '0');
                  let day = String(pragueDate.getDate()).padStart(2, '0');
                  
                  let filename = `../program_${year}_${month}_${day}.pdf`;
                  window.location.replace(filename);
              </script>
          </head>
          <body>
              <p>Redirecting to today's schedule...</p>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./programy2026

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
